<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Arena Push</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="shell">
      <section class="panel intro-panel" id="menu-panel">
        <p class="eyebrow">2-Player Mobile Web Mini Game</p>
        <h1>Arena Push</h1>
        <p class="intro-copy">
          방 코드를 몰라도 공개 대기방에 바로 들어가서 2인 대전을 시작할 수 있습니다.
        </p>

        <div class="stack">
          <label class="field">
            <span>Your name</span>
            <input id="player-name" maxlength="20" placeholder="Player" value="Player" />
          </label>
          <button class="primary" id="create-room">공개 방 만들기</button>
        </div>

        <section class="match-list">
          <div class="section-head">
            <div>
              <p class="eyebrow">Open Rooms</p>
              <h2>지금 들어갈 수 있는 방</h2>
            </div>
            <button class="ghost small" id="refresh-rooms">Refresh</button>
          </div>
          <p class="status-line" id="rooms-status">공개 대기방을 불러오는 중입니다.</p>
          <div class="rooms-grid" id="public-rooms"></div>
        </section>

        <section class="code-panel">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Private Code</p>
              <h2>코드로 바로 참가</h2>
            </div>
          </div>
          <div class="join-row">
            <input id="room-code" maxlength="4" placeholder="ROOM" />
            <button id="join-room">Join</button>
          </div>
        </section>
      </section>

      <section class="panel lobby-panel hidden" id="lobby-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Room</p>
            <h2 id="room-title">----</h2>
          </div>
          <button class="ghost" id="copy-room">Copy code</button>
        </div>
        <div class="player-cards" id="player-cards"></div>
        <div class="stack">
          <button class="primary" id="ready-button">준비</button>
          <button class="ghost hidden" id="rematch-button">재대결</button>
        </div>
        <p class="status-line" id="lobby-status">상대가 들어오면 준비를 눌러 시작하세요.</p>
      </section>

      <section class="panel game-panel hidden" id="game-panel">
        <div class="hud">
          <div class="score-chip" id="phase-label">Lobby</div>
          <div class="timer" id="timer-label">00.0</div>
          <div class="score-chip" id="result-label">Fight</div>
        </div>
        <div class="arena-wrap">
          <canvas id="arena-canvas" width="420" height="420"></canvas>
        </div>
        <div class="controls-row">
          <div class="push-wrap">
            <button class="push-button" id="push-button" type="button">
              <span class="push-title">밀치기</span>
              <span class="push-meta" id="push-meta">Ready</span>
            </button>
          </div>
          <div class="joystick-wrap">
            <div class="joystick-copy">
              <strong>Move</strong>
              <span>오른쪽 조이스틱으로 움직이고, 왼쪽 버튼으로 짧게 들이받으세요.</span>
            </div>
            <div class="joystick-base" id="joystick-zone">
              <div class="joystick-knob" id="joystick-knob"></div>
            </div>
          </div>
        </div>
        <p class="status-line" id="game-status">상대를 경기장 밖으로 밀어내세요.</p>
      </section>
    </div>

    <div class="toast hidden" id="toast"></div>
    <script src="/app.js"></script>
  </body>
</html>
